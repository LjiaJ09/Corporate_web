<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品详情</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --line: #eaeef3;
      --title: #1a2b3c;
      --text: #5a6b7d;
      --brand: #1481cf;
      --brand-dark: #0c5f9c;
      --muted: #94a3b5;
      --accent: #ff8b00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--title);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: min(1200px, 100% - 48px);
      margin: 32px auto 48px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--brand);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .main {
      display: block;
    }

    .gallery {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--line);
      background: #fcfdfe;
    }

    .main-image {
      position: relative;
      width: min(100%, 860px);
      margin: 0 auto;
      aspect-ratio: 4 / 3;
      border: 1px solid var(--line);
      background: #f5f8fb;
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(1.015);
      transition: opacity 0.4s ease, transform 0.4s ease;
      user-select: none;
    }

    .main-image img.is-visible {
      opacity: 1;
      transform: scale(1);
    }

    .image-fallback {
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 0 20px;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(10, 30, 50, 0.6);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .gallery-nav:hover {
      background: rgba(10, 30, 50, 0.85);
    }

    .gallery-nav.prev {
      left: 12px;
    }

    .gallery-nav.next {
      right: 12px;
    }

    .main-image:hover .gallery-nav {
      display: inline-grid;
      place-items: center;
    }

    .gallery-caption {
      margin-top: 18px;
      text-align: center;
    }

    .gallery-product {
      font-size: 16px;
      font-weight: 600;
      color: var(--title);
      line-height: 1.5;
    }

    .gallery-model {
      min-height: 24px;
      margin-top: 4px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    .thumbs-shell {
      --thumb-width: 108px;
      --thumb-gap: 12px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 18px;
      width: min(100%, calc(var(--thumb-width) * 5 + var(--thumb-gap) * 4 + 108px));
      margin-left: auto;
      margin-right: auto;
    }

    .thumbs-shell.is-scrollable {
      padding: 0 54px;
    }

    .thumbs-shell.is-scrollable::before,
    .thumbs-shell.is-scrollable::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 96px;
      z-index: 1;
      pointer-events: none;
    }

    .thumbs-shell.is-scrollable::before {
      left: 0;
      background:
        linear-gradient(90deg, rgba(252, 253, 254, 0.98) 0%, rgba(252, 253, 254, 0.92) 28%, rgba(252, 253, 254, 0.62) 68%, rgba(252, 253, 254, 0) 100%);
    }

    .thumbs-shell.is-scrollable::after {
      right: 0;
      background:
        linear-gradient(270deg, rgba(252, 253, 254, 0.98) 0%, rgba(252, 253, 254, 0.92) 28%, rgba(252, 253, 254, 0.62) 68%, rgba(252, 253, 254, 0) 100%);
    }

    .thumbs-viewport {
      overflow-x: auto;
      overflow-y: hidden;
      width: min(100%, calc(var(--thumb-width) * 5 + var(--thumb-gap) * 4));
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x;
    }

    .thumbs-shell.is-static .thumbs-viewport {
      width: auto;
      max-width: 100%;
    }

    .thumbs-viewport::-webkit-scrollbar {
      display: none;
    }

    .thumbs-track {
      display: flex;
      gap: var(--thumb-gap);
      width: max-content;
      margin: 0 auto;
      padding: 4px 0;
    }

    .thumb-hotspot {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 72px;
      border: none;
      display: none;
      align-items: center;
      justify-content: center;
      color: rgba(26, 43, 60, 0.72);
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      z-index: 3;
      background: transparent;
      transition: color 0.2s, opacity 0.2s, transform 0.2s;
      opacity: 0.88;
    }

    .thumb-hotspot:hover {
      color: var(--brand);
      opacity: 1;
      transform: scale(1.06);
    }

    .thumbs-shell.is-scrollable .thumb-hotspot {
      display: flex;
    }

    .thumb-hotspot.left {
      left: 0;
    }

    .thumb-hotspot.right {
      right: 0;
    }

    .thumb {
      width: 108px;
      min-width: 108px;
      border: 2px solid transparent;
      border-radius: 10px;
      background: #fff;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(15, 32, 55, 0.04);
    }

    .thumb:hover {
      border-color: #c8d6e5;
    }

    .thumb-frame {
      display: block;
      width: 100%;
      height: 72px;
      overflow: hidden;
      background: #f7f9fc;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .thumb-label {
      display: block;
      padding: 8px 8px 10px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thumb.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(20, 129, 207, 0.15);
    }

    .info {
      padding: 28px 32px 32px;
    }

    .meta {
      display: grid;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--title);
    }

    .meta-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block {
      min-width: 0;
    }

    .code {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      font-family: "SF Mono", "Consolas", monospace;
    }

    .industry {
      display: inline-flex;
      align-items: center;
      margin-bottom: 16px;
      padding: 5px 12px;
      border-radius: 6px;
      background: linear-gradient(135deg, #edf5ff, #f0f7ff);
      color: var(--brand);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .model-chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 14px;
      border-radius: 999px;
      background: #fff4e6;
      color: #a85b00;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .section {
      margin-top: 22px;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--title);
      letter-spacing: 0.01em;
    }

    .summary {
      margin: 0;
      color: var(--text);
      line-height: 1.85;
      white-space: pre-line;
      font-size: 14.5px;
    }

    .feature-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
    }

    .feature-list li::marker {
      color: var(--brand);
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .detail-table th,
    .detail-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      line-height: 1.7;
      white-space: pre-line;
    }

    .detail-table tr:last-child th,
    .detail-table tr:last-child td {
      border-bottom: none;
    }

    .detail-table th {
      width: 22%;
      background: #f8fafc;
      color: var(--title);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .variant-block {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      margin-top: 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
      transition: box-shadow 0.2s;
    }

    .variant-block:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .variant-title {
      margin: 0;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 600;
      color: var(--title);
      background: #f8fafc;
      border-left: 3px solid var(--brand);
      border-bottom: 1px solid var(--line);
    }

    .group-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13.5px;
      color: var(--text);
    }

    .group-table th,
    .group-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      text-align: left;
      vertical-align: top;
      white-space: pre-line;
      line-height: 1.6;
    }

    .group-table tr:last-child td {
      border-bottom: none;
    }

    .group-table th {
      width: 28%;
      background: #fafbfd;
      color: var(--title);
      font-weight: 600;
      font-size: 13px;
    }

    .not-found {
      border: 1px solid var(--line);
      background: #fff;
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      border-radius: 12px;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      .gallery {
        padding: 24px;
      }

      .info {
        padding: 24px;
      }

      .title {
        font-size: 26px;
      }

      .main-image:hover .gallery-nav {
        display: inline-grid;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: calc(100% - 24px);
        margin-top: 16px;
        margin-bottom: 32px;
      }

      .gallery {
        padding: 18px;
      }

      .info {
        padding: 20px;
      }

      .meta {
        gap: 8px;
      }

      .meta-top {
        flex-direction: column;
      }

      .title {
        font-size: 22px;
      }

      .thumbs-shell {
        width: 100%;
      }

      .thumbs-shell.is-scrollable {
        padding: 0 38px;
      }

      .thumbs-viewport {
        width: min(100%, calc(3 * var(--thumb-width) + var(--thumb-gap) * 2));
      }

      .thumb {
        width: 96px;
        min-width: 96px;
      }

      .thumb-frame {
        height: 66px;
      }

      .thumb-hotspot {
        width: 52px;
      }
    }
  </style>
  <script defer src="./site-data.js"></script>
  <script defer src="./product-detail-data.js"></script>
</head>
<body>
  <main class="wrap">
    <a class="back-link" href="./index.html#products">← 返回产品中心</a>
    <section id="detailRoot"></section>
  </main>

  <script>
    (function () {
      function getCode() {
        var params = new URLSearchParams(window.location.search);
        return params.get("code");
      }

      function createElement(tag, className, text) {
        var node = document.createElement(tag);
        if (className) {
          node.className = className;
        }
        if (typeof text === "string") {
          node.textContent = text;
        }
        return node;
      }

      function getOptimizedGalleryImage(code, src) {
        var optimizedByCode = {
          "01": "./assets/optimized/products/energy-storage.jpg",
          "02": "./assets/optimized/products/hybrid-inverter.jpg",
          "03": "./assets/optimized/products/two-wheel-scooter.jpg",
          "04": "./assets/optimized/products/tricycle.jpg",
          "05": "./assets/optimized/products/e-bike.jpg",
          "06": "./assets/optimized/products/projector.jpg",
          "08": "./assets/optimized/products/bluetooth-speaker.jpg"
        };

        if (optimizedByCode[code]) {
          return optimizedByCode[code];
        }

        return src;
      }

      function findSummaryProduct(siteData, code) {
        var products = [];
        var index = 0;

        if (!siteData || !Array.isArray(siteData.products)) {
          return null;
        }

        products = siteData.products;
        for (index = 0; index < products.length; index += 1) {
          if (products[index] && products[index].code === code) {
            return products[index];
          }
        }

        return null;
      }

      function getSafeText(value, fallback) {
        if (typeof value === "string") {
          if (value.trim()) {
            return value.trim();
          }
        }

        if (typeof fallback === "string") {
          return fallback;
        }

        return "";
      }

      function splitTextLines(value) {
        var lines = [];
        var source = "";
        var rawParts = [];
        var index = 0;
        var current = "";

        if (typeof value !== "string") {
          return lines;
        }

        source = value.replace(/\r\n/g, "\n");
        rawParts = source.split("\n");
        for (index = 0; index < rawParts.length; index += 1) {
          current = rawParts[index].trim();
          if (current) {
            lines.push(current);
          }
        }

        return lines;
      }

      function getDisplayImage(images, index, productCode) {
        var safeImages = [];
        var safeIndex = 0;
        var imageItem = null;
        var src = "";

        if (!Array.isArray(images) || images.length === 0) {
          return "";
        }

        safeImages = images;
        safeIndex = index;
        if (safeIndex < 0) {
          safeIndex = 0;
        }
        if (safeIndex >= safeImages.length) {
          safeIndex = safeImages.length - 1;
        }

        imageItem = safeImages[safeIndex];
        if (imageItem && typeof imageItem === "object") {
          src = getSafeText(imageItem.src, "");
        } else {
          src = imageItem;
        }

        return getOptimizedGalleryImage(productCode, src);
      }

      function getThumbImage(images, index) {
        var safeImages = [];
        var safeIndex = 0;
        var imageItem = null;
        var src = "";

        if (!Array.isArray(images) || images.length === 0) {
          return "";
        }

        safeImages = images;
        safeIndex = index;
        if (safeIndex < 0) {
          safeIndex = 0;
        }
        if (safeIndex >= safeImages.length) {
          safeIndex = safeImages.length - 1;
        }

        imageItem = safeImages[safeIndex];
        if (imageItem && typeof imageItem === "object") {
          src = getSafeText(imageItem.thumbSrc, "");
          if (!src) {
            src = getSafeText(imageItem.optimizedSrc, "");
          }
          if (!src) {
            src = getSafeText(imageItem.src, "");
          }
          return src;
        }

        return getSafeText(imageItem, "");
      }

      function getDisplayModel(images, index, totalCount) {
        var safeImages = [];
        var safeIndex = 0;
        var imageItem = null;
        var modelName = "";

        if (!Array.isArray(images) || images.length === 0) {
          return "";
        }

        safeImages = images;
        safeIndex = index;
        if (safeIndex < 0) {
          safeIndex = 0;
        }
        if (safeIndex >= safeImages.length) {
          safeIndex = safeImages.length - 1;
        }

        imageItem = safeImages[safeIndex];
        if (imageItem && typeof imageItem === "object") {
          modelName = getSafeText(imageItem.model, "");
        }

        if (!modelName && totalCount > 1) {
          modelName = "产品图片 " + String(index + 1);
        }

        return modelName;
      }

      function splitNoteText(noteText) {
        var result = {
          accessories: "-",
          shipping: "-"
        };
        var safeText = "";
        var shippingIndex = -1;

        if (typeof noteText !== "string") {
          return result;
        }

        safeText = noteText.trim();
        if (!safeText || safeText === "-") {
          return result;
        }

        shippingIndex = safeText.indexOf("40尺");
        if (shippingIndex === -1) {
          shippingIndex = safeText.indexOf("20尺");
        }
        if (shippingIndex === -1) {
          shippingIndex = safeText.indexOf("柜");
        }

        if (shippingIndex > 0) {
          result.accessories = safeText.slice(0, shippingIndex).replace(/[、\s]+$/, "").trim();
          result.shipping = safeText.slice(shippingIndex).trim();
        } else {
          result.accessories = safeText;
        }

        if (!result.accessories) {
          result.accessories = "-";
        }
        if (!result.shipping) {
          result.shipping = "-";
        }

        return result;
      }

      function createSimpleDisplayItem(detailProduct, row, summaryText, imageSrc, index) {
        var noteInfo = splitNoteText(row.note_raw);
        var featureLines = splitTextLines(row.config_raw);
        var detailRows = [];

        detailRows.push({
          label: "型号",
          value: getSafeText(row.model, "-")
        });

        if (getSafeText(row.category, "")) {
          detailRows.push({
            label: "类别",
            value: getSafeText(row.category, "-")
          });
        }

        detailRows.push({
          label: "配置",
          value: getSafeText(row.config_raw, "-")
        });
        detailRows.push({
          label: "配件信息",
          value: noteInfo.accessories
        });
        detailRows.push({
          label: "装柜信息",
          value: noteInfo.shipping
        });

        return {
          id: detailProduct.code + "-simple-" + String(index),
          type: "simple",
          title: getSafeText(detailProduct.name, "产品详情"),
          modelName: getSafeText(row.model, ""),
          imageSrc: imageSrc,
          summary: getSafeText(summaryText, ""),
          industry: getSafeText(detailProduct.industry, "未分类"),
          productCode: getSafeText(detailProduct.code, "-"),
          features: featureLines,
          detailRows: detailRows,
          structuredParams: null
        };
      }

      function createStructuredDisplayItem(detailProduct, variantItem, summaryText, imageSrc, index) {
        var features = [];
        var coreFeatures = [];
        var featureIndex = 0;

        if (Array.isArray(detailProduct.coreFeatures)) {
          coreFeatures = detailProduct.coreFeatures;
        }

        for (featureIndex = 0; featureIndex < coreFeatures.length; featureIndex += 1) {
          if (typeof coreFeatures[featureIndex] === "string" && coreFeatures[featureIndex].trim()) {
            features.push(coreFeatures[featureIndex].trim());
          }
        }

        return {
          id: detailProduct.code + "-structured-" + String(index),
          type: "structured",
          title: getSafeText(detailProduct.name, "产品详情"),
          modelName: getSafeText(variantItem.variant, ""),
          imageSrc: imageSrc,
          summary: getSafeText(summaryText, ""),
          industry: getSafeText(detailProduct.industry, "未分类"),
          productCode: getSafeText(detailProduct.code, "-"),
          features: features,
          detailRows: [],
          structuredParams: variantItem.params || {}
        };
      }

      function createProductDisplayItem(detailProduct, summaryText, imageSrc, index, totalCount) {
        var features = [];
        var coreFeatures = [];
        var featureIndex = 0;
        var modelName = getDisplayModel(detailProduct.images, index, totalCount);

        if (Array.isArray(detailProduct.coreFeatures)) {
          coreFeatures = detailProduct.coreFeatures;
        }

        for (featureIndex = 0; featureIndex < coreFeatures.length; featureIndex += 1) {
          if (typeof coreFeatures[featureIndex] === "string" && coreFeatures[featureIndex].trim()) {
            features.push(coreFeatures[featureIndex].trim());
          }
        }

        return {
          id: detailProduct.code + "-product-" + String(index),
          type: "product",
          title: getSafeText(detailProduct.name, "产品详情"),
          modelName: modelName,
          imageSrc: imageSrc,
          thumbSrc: getThumbImage(detailProduct.images, index),
          summary: getSafeText(summaryText, ""),
          industry: getSafeText(detailProduct.industry, "未分类"),
          productCode: getSafeText(detailProduct.code, "-"),
          features: features,
          detailRows: [],
          structuredParams: null
        };
      }

      function buildDisplayItems(detailProduct, summaryText) {
        var items = [];
        var variants = [];
        var images = [];
        var variantIndex = 0;
        var imageIndex = 0;
        var variantItem = null;
        var row = null;

        if (!detailProduct) {
          return items;
        }

        if (Array.isArray(detailProduct.variants)) {
          variants = detailProduct.variants;
        }
        if (Array.isArray(detailProduct.images)) {
          images = detailProduct.images;
        }

        for (variantIndex = 0; variantIndex < variants.length; variantIndex += 1) {
          variantItem = variants[variantIndex];
          if (!variantItem || typeof variantItem !== "object") {
            continue;
          }

          if (Object.prototype.hasOwnProperty.call(variantItem, "model")) {
            row = variantItem;
            if (!getSafeText(row.model, "") || row.model === "车型") {
              continue;
            }

            items.push(
              createSimpleDisplayItem(
                detailProduct,
                row,
                summaryText,
                getDisplayImage(images, items.length, detailProduct.code),
                items.length
              )
            );
            continue;
          }

          items.push(
            createStructuredDisplayItem(
              detailProduct,
              variantItem,
              summaryText,
              getDisplayImage(images, items.length, detailProduct.code),
              items.length
            )
          );
        }

        if (items.length > 0) {
          return items;
        }

        if (images.length === 0) {
          items.push(createProductDisplayItem(detailProduct, summaryText, "", 0, 1));
          return items;
        }

        for (imageIndex = 0; imageIndex < images.length; imageIndex += 1) {
          items.push(
            createProductDisplayItem(
              detailProduct,
              summaryText,
              getDisplayImage(images, imageIndex, detailProduct.code),
              imageIndex,
              images.length
            )
          );
        }

        return items;
      }

      function renderNotFound(root) {
        var box = createElement("div", "not-found", "未找到对应产品，请返回产品中心重新选择。");
        root.innerHTML = "";
        root.appendChild(box);
      }

      function buildLayout() {
        var refs = {};
        var card = createElement("article", "card");
        var main = createElement("section", "main");
        var gallery = createElement("section", "gallery");
        var mainImage = createElement("div", "main-image");
        var image = document.createElement("img");
        var fallback = createElement("div", "image-fallback", "暂无产品图片");
        var prev = createElement("button", "gallery-nav prev", "‹");
        var next = createElement("button", "gallery-nav next", "›");
        var caption = createElement("div", "gallery-caption");
        var galleryProduct = createElement("div", "gallery-product");
        var galleryModel = createElement("div", "gallery-model");
        var thumbsShell = createElement("div", "thumbs-shell is-static");
        var leftHotspot = createElement("button", "thumb-hotspot left", "‹");
        var rightHotspot = createElement("button", "thumb-hotspot right", "›");
        var thumbsViewport = createElement("div", "thumbs-viewport");
        var thumbsTrack = createElement("div", "thumbs-track");
        var info = createElement("section", "info");
        var meta = createElement("div", "meta");
        var metaTop = createElement("div", "meta-top");
        var titleBlock = createElement("div", "title-block");
        var title = createElement("h1", "title");
        var code = createElement("span", "code");
        var industry = createElement("span", "industry");
        var modelChip = createElement("div", "model-chip");
        var summarySection = createElement("section", "section");
        var summaryTitle = createElement("h3", "", "产品概述");
        var summary = createElement("p", "summary");
        var featureSection = createElement("section", "section");
        var featureTitle = createElement("h3", "", "当前型号配置");
        var featureList = createElement("ul", "feature-list");
        var detailSection = createElement("section", "section");
        var detailTitle = createElement("h3", "", "详细规格");
        var detailContent = createElement("div", "variant-container");

        prev.type = "button";
        next.type = "button";
        leftHotspot.type = "button";
        rightHotspot.type = "button";

        prev.setAttribute("aria-label", "上一项");
        next.setAttribute("aria-label", "下一项");
        leftHotspot.setAttribute("aria-label", "向左滚动缩略图");
        rightHotspot.setAttribute("aria-label", "向右滚动缩略图");

        image.loading = "eager";
        image.decoding = "async";
        image.fetchPriority = "high";
        image.draggable = false;

        mainImage.appendChild(fallback);
        mainImage.appendChild(prev);
        mainImage.appendChild(next);
        mainImage.appendChild(image);

        caption.appendChild(galleryProduct);
        caption.appendChild(galleryModel);

        thumbsViewport.appendChild(thumbsTrack);
        thumbsShell.appendChild(leftHotspot);
        thumbsShell.appendChild(thumbsViewport);
        thumbsShell.appendChild(rightHotspot);

        gallery.appendChild(mainImage);
        gallery.appendChild(caption);
        gallery.appendChild(thumbsShell);

        titleBlock.appendChild(title);
        titleBlock.appendChild(industry);
        metaTop.appendChild(titleBlock);
        metaTop.appendChild(code);
        meta.appendChild(metaTop);
        meta.appendChild(modelChip);

        summarySection.appendChild(summaryTitle);
        summarySection.appendChild(summary);

        featureSection.appendChild(featureTitle);
        featureSection.appendChild(featureList);

        detailSection.appendChild(detailTitle);
        detailSection.appendChild(detailContent);

        info.appendChild(meta);
        info.appendChild(summarySection);
        info.appendChild(featureSection);
        info.appendChild(detailSection);

        main.appendChild(gallery);
        main.appendChild(info);
        card.appendChild(main);

        refs.card = card;
        refs.image = image;
        refs.fallback = fallback;
        refs.prev = prev;
        refs.next = next;
        refs.galleryProduct = galleryProduct;
        refs.galleryModel = galleryModel;
        refs.thumbsShell = thumbsShell;
        refs.leftHotspot = leftHotspot;
        refs.rightHotspot = rightHotspot;
        refs.thumbsViewport = thumbsViewport;
        refs.thumbsTrack = thumbsTrack;
        refs.title = title;
        refs.code = code;
        refs.industry = industry;
        refs.modelChip = modelChip;
        refs.summarySection = summarySection;
        refs.summary = summary;
        refs.featureSection = featureSection;
        refs.featureTitle = featureTitle;
        refs.featureList = featureList;
        refs.detailSection = detailSection;
        refs.detailContent = detailContent;
        refs.thumbButtons = [];

        return refs;
      }

      function buildDetailTable(rows) {
        var table = createElement("table", "detail-table");
        var tbody = document.createElement("tbody");
        var index = 0;
        var row = null;
        var tr = null;

        for (index = 0; index < rows.length; index += 1) {
          row = rows[index];
          if (!row) {
            continue;
          }

          tr = document.createElement("tr");
          tr.appendChild(createElement("th", "", getSafeText(row.label, "-")));
          tr.appendChild(createElement("td", "", getSafeText(row.value, "-")));
          tbody.appendChild(tr);
        }

        table.appendChild(tbody);
        return table;
      }

      function buildStructuredTables(params) {
        var fragment = document.createDocumentFragment();
        var groupKeys = [];
        var groupIndex = 0;
        var groupKey = "";
        var groupParams = null;
        var itemKeys = [];
        var itemIndex = 0;
        var itemKey = "";
        var block = null;
        var title = null;
        var table = null;
        var tbody = null;
        var row = null;

        if (!params || typeof params !== "object") {
          return fragment;
        }

        groupKeys = Object.keys(params);
        for (groupIndex = 0; groupIndex < groupKeys.length; groupIndex += 1) {
          groupKey = groupKeys[groupIndex];
          groupParams = params[groupKey];
          block = createElement("article", "variant-block");
          title = createElement("h4", "variant-title", groupKey);
          table = createElement("table", "detail-table");
          tbody = document.createElement("tbody");

          itemKeys = Object.keys(groupParams || {});
          for (itemIndex = 0; itemIndex < itemKeys.length; itemIndex += 1) {
            itemKey = itemKeys[itemIndex];
            row = document.createElement("tr");
            row.appendChild(createElement("th", "", itemKey));
            row.appendChild(createElement("td", "", String(groupParams[itemKey])));
            tbody.appendChild(row);
          }

          table.appendChild(tbody);
          block.appendChild(title);
          block.appendChild(table);
          fragment.appendChild(block);
        }

        return fragment;
      }

      function createThumbButton(item, index, onClick) {
        var button = createElement("button", "thumb");
        var frame = createElement("span", "thumb-frame");
        var label = createElement("span", "thumb-label");
        var image = null;
        var labelText = "";

        button.type = "button";
        button.setAttribute("data-index", String(index));
        button.setAttribute("aria-label", "切换到第 " + String(index + 1) + " 个型号");

        if (item.imageSrc) {
          image = document.createElement("img");
          image.src = getSafeText(item.thumbSrc, item.imageSrc);
          image.alt = item.title + " 缩略图 " + String(index + 1);
          image.loading = "lazy";
          image.decoding = "async";
          image.addEventListener("error", function () {
            frame.removeChild(image);
            frame.textContent = item.productCode || String(index + 1);
          });
          frame.appendChild(image);
        } else {
          frame.textContent = item.productCode || String(index + 1);
        }

        labelText = getSafeText(item.modelName, "");
        if (!labelText) {
          labelText = item.title;
        }

        label.textContent = labelText;
        button.appendChild(frame);
        button.appendChild(label);
        button.addEventListener("click", function () {
          onClick(index);
        });

        return button;
      }

      function initThumbScroller(refs, state) {
        var timerId = 0;
        var speed = 0;
        var edgeWidth = 88;
        var baseSpeed = 4;
        var maxSpeed = 14;
        var stepSize = 136;

        function hasOverflow() {
          return refs.thumbsViewport.scrollWidth > refs.thumbsViewport.clientWidth + 4;
        }

        function syncScrollableState() {
          state.isScrollable = hasOverflow();
          refs.thumbsShell.classList.toggle("is-scrollable", state.isScrollable);
          refs.thumbsShell.classList.toggle("is-static", !state.isScrollable);
        }

        function stopScroll() {
          speed = 0;
          if (timerId) {
            window.clearInterval(timerId);
            timerId = 0;
          }
        }

        function tick() {
          var viewport = refs.thumbsViewport;
          var maxScrollLeft = viewport.scrollWidth - viewport.clientWidth;
          var nextScrollLeft = viewport.scrollLeft + speed;

          if (!state.isScrollable || !speed) {
            stopScroll();
            return;
          }

          if (nextScrollLeft < 0) {
            nextScrollLeft = 0;
          }
          if (nextScrollLeft > maxScrollLeft) {
            nextScrollLeft = maxScrollLeft;
          }

          viewport.scrollLeft = nextScrollLeft;

          if ((nextScrollLeft === 0 && speed < 0) || (nextScrollLeft === maxScrollLeft && speed > 0)) {
            stopScroll();
          }
        }

        function startScroll(nextSpeed) {
          if (!state.isScrollable) {
            return;
          }

          speed = nextSpeed;
          if (!timerId) {
            timerId = window.setInterval(tick, 16);
          }
        }

        function handlePointerMove(event) {
          var rect = null;
          var relativeX = 0;
          var distance = 0;
          var ratio = 0;
          var nextSpeed = 0;

          if (!state.isScrollable) {
            stopScroll();
            return;
          }

          rect = refs.thumbsShell.getBoundingClientRect();
          relativeX = event.clientX - rect.left;

          if (relativeX <= edgeWidth) {
            distance = edgeWidth - relativeX;
            ratio = distance / edgeWidth;
            nextSpeed = -1 * (baseSpeed + (maxSpeed - baseSpeed) * ratio);
            startScroll(nextSpeed);
            return;
          }

          if (relativeX >= rect.width - edgeWidth) {
            distance = relativeX - (rect.width - edgeWidth);
            ratio = distance / edgeWidth;
            nextSpeed = baseSpeed + (maxSpeed - baseSpeed) * ratio;
            startScroll(nextSpeed);
            return;
          }

          stopScroll();
        }

        function scrollByStep(direction) {
          if (!state.isScrollable) {
            return;
          }

          refs.thumbsViewport.scrollBy({
            left: direction * stepSize,
            behavior: "smooth"
          });
        }

        refs.thumbsShell.addEventListener("mousemove", handlePointerMove);
        refs.thumbsViewport.addEventListener("mousemove", handlePointerMove);
        refs.thumbsShell.addEventListener("mouseleave", stopScroll);
        refs.thumbsViewport.addEventListener("mouseleave", stopScroll);

        refs.leftHotspot.addEventListener("mouseenter", function () {
          startScroll(-1 * maxSpeed);
        });
        refs.leftHotspot.addEventListener("mouseleave", stopScroll);
        refs.rightHotspot.addEventListener("mouseenter", function () {
          startScroll(maxSpeed);
        });
        refs.rightHotspot.addEventListener("mouseleave", stopScroll);
        refs.leftHotspot.addEventListener("focus", function () {
          startScroll(-1 * maxSpeed);
        });
        refs.leftHotspot.addEventListener("blur", stopScroll);
        refs.rightHotspot.addEventListener("focus", function () {
          startScroll(maxSpeed);
        });
        refs.rightHotspot.addEventListener("blur", stopScroll);
        refs.leftHotspot.addEventListener("click", function () {
          scrollByStep(-1);
        });
        refs.rightHotspot.addEventListener("click", function () {
          scrollByStep(1);
        });

        window.addEventListener("resize", syncScrollableState);

        state.stopThumbScroll = stopScroll;
        state.refreshThumbScroller = syncScrollableState;
      }

      function updateMainImage(refs, item, showNavigation) {
        var nextAlt = item.title;

        refs.prev.style.display = showNavigation ? "inline-grid" : "none";
        refs.next.style.display = showNavigation ? "inline-grid" : "none";

        if (item.modelName) {
          refs.galleryModel.textContent = item.modelName;
          nextAlt = item.title + " - " + item.modelName;
        } else {
          refs.galleryModel.textContent = "";
        }

        refs.galleryProduct.textContent = item.title;

        if (!item.imageSrc) {
          refs.image.classList.remove("is-visible");
          refs.image.removeAttribute("src");
          refs.image.alt = "";
          refs.fallback.style.display = "block";
          refs.fallback.textContent = "暂无产品图片";
          return;
        }

        refs.fallback.style.display = "none";
        refs.image.classList.remove("is-visible");
        refs.image.alt = nextAlt;
        refs.image.src = item.imageSrc;
      }

      function updateInfo(refs, item) {
        var featureIndex = 0;
        var rows = [];

        refs.title.textContent = item.title;
        refs.code.textContent = "产品编号：" + item.productCode;
        refs.industry.textContent = item.industry || "未分类";

        if (item.modelName) {
          refs.modelChip.style.display = "inline-flex";
          refs.modelChip.textContent = "当前型号：" + item.modelName;
        } else {
          refs.modelChip.style.display = "none";
          refs.modelChip.textContent = "";
        }

        if (item.summary) {
          refs.summarySection.style.display = "block";
          refs.summary.textContent = item.summary;
        } else {
          refs.summarySection.style.display = "none";
          refs.summary.textContent = "";
        }

        refs.featureList.innerHTML = "";
        if (Array.isArray(item.features) && item.features.length > 0) {
          refs.featureSection.style.display = "block";
          if (item.type === "product") {
            refs.featureTitle.textContent = "核心参数";
          } else {
            refs.featureTitle.textContent = "当前型号配置";
          }

          for (featureIndex = 0; featureIndex < item.features.length; featureIndex += 1) {
            refs.featureList.appendChild(createElement("li", "", item.features[featureIndex]));
          }
        } else {
          refs.featureSection.style.display = "none";
        }

        refs.detailContent.innerHTML = "";
        if (item.type === "simple") {
          rows = item.detailRows || [];
          refs.detailSection.style.display = "block";
          refs.detailContent.appendChild(buildDetailTable(rows));
        } else if (item.type === "structured") {
          refs.detailSection.style.display = "block";
          refs.detailContent.appendChild(buildStructuredTables(item.structuredParams));
        } else {
          refs.detailSection.style.display = "none";
        }

        if (item.modelName) {
          document.title = item.title + " - " + item.modelName;
        } else {
          document.title = item.title;
        }
      }

      function centerActiveThumb(refs, index, isScrollable) {
        var button = null;
        var targetLeft = 0;
        var maxScroll = 0;

        if (!isScrollable) {
          return;
        }

        button = refs.thumbButtons[index];
        if (!button) {
          return;
        }

        targetLeft = button.offsetLeft - (refs.thumbsViewport.clientWidth - button.offsetWidth) / 2;
        maxScroll = refs.thumbsViewport.scrollWidth - refs.thumbsViewport.clientWidth;

        if (targetLeft < 0) {
          targetLeft = 0;
        }
        if (targetLeft > maxScroll) {
          targetLeft = maxScroll;
        }

        refs.thumbsViewport.scrollTo({
          left: targetLeft,
          behavior: "smooth"
        });
      }

      function normalizeLoopIndex(index, totalCount) {
        var safeIndex = index;

        if (totalCount <= 0) {
          return 0;
        }

        if (safeIndex < 0) {
          safeIndex = totalCount - 1;
        }
        if (safeIndex >= totalCount) {
          safeIndex = 0;
        }

        return safeIndex;
      }

      function preloadDisplayImage(state, item) {
        var imageSrc = "";
        var preloadImage = null;

        if (!state || !item) {
          return;
        }

        imageSrc = getSafeText(item.imageSrc, "");
        if (!imageSrc || state.preloadedImages[imageSrc]) {
          return;
        }

        preloadImage = new Image();
        preloadImage.decoding = "async";
        preloadImage.src = imageSrc;
        state.preloadedImages[imageSrc] = preloadImage;
      }

      function preloadNearbyImages(state, items, activeIndex) {
        var totalCount = 0;
        var currentIndex = 0;
        var prevIndex = 0;
        var nextIndex = 0;

        if (!state || !Array.isArray(items) || items.length === 0) {
          return;
        }

        totalCount = items.length;
        currentIndex = normalizeLoopIndex(activeIndex, totalCount);
        prevIndex = normalizeLoopIndex(currentIndex - 1, totalCount);
        nextIndex = normalizeLoopIndex(currentIndex + 1, totalCount);

        preloadDisplayImage(state, items[currentIndex]);
        if (prevIndex !== currentIndex) {
          preloadDisplayImage(state, items[prevIndex]);
        }
        if (nextIndex !== currentIndex && nextIndex !== prevIndex) {
          preloadDisplayImage(state, items[nextIndex]);
        }
      }

      function init() {
        var root = document.getElementById("detailRoot");
        var code = getCode();
        var detailData = window.PRODUCT_DETAIL_DATA;
        var siteData = window.SITE_DATA;
        var detailProducts = [];
        var detailProduct = null;
        var summaryProduct = null;
        var displayItems = [];
        var refs = null;
        var state = {
          activeIndex: 0,
          isScrollable: false,
          stopThumbScroll: null,
          refreshThumbScroller: null,
          preloadedImages: {}
        };
        var productIndex = 0;
        var thumbIndex = 0;

        if (!root) {
          return;
        }

        if (!detailData || !Array.isArray(detailData.products) || !code) {
          renderNotFound(root);
          return;
        }

        detailProducts = detailData.products;
        for (productIndex = 0; productIndex < detailProducts.length; productIndex += 1) {
          if (detailProducts[productIndex] && detailProducts[productIndex].code === code) {
            detailProduct = detailProducts[productIndex];
            break;
          }
        }

        if (!detailProduct) {
          renderNotFound(root);
          return;
        }

        summaryProduct = findSummaryProduct(siteData, code);
        displayItems = buildDisplayItems(detailProduct, summaryProduct ? summaryProduct.text : "");

        if (displayItems.length === 0) {
          renderNotFound(root);
          return;
        }

        refs = buildLayout();
        refs.image.addEventListener("load", function () {
          refs.image.classList.add("is-visible");
          refs.fallback.style.display = "none";
        });

        refs.image.addEventListener("error", function () {
          refs.image.classList.remove("is-visible");
          refs.image.removeAttribute("src");
          refs.fallback.style.display = "block";
          refs.fallback.textContent = "图片加载失败";
        });

        function setActiveItem(nextIndex) {
          var safeIndex = normalizeLoopIndex(nextIndex, displayItems.length);
          var button = null;

          state.activeIndex = safeIndex;
          updateMainImage(refs, displayItems[safeIndex], displayItems.length > 1);
          updateInfo(refs, displayItems[safeIndex]);

          for (thumbIndex = 0; thumbIndex < refs.thumbButtons.length; thumbIndex += 1) {
            button = refs.thumbButtons[thumbIndex];
            button.classList.toggle("active", thumbIndex === safeIndex);
          }

          centerActiveThumb(refs, safeIndex, state.isScrollable);
          preloadNearbyImages(state, displayItems, safeIndex);
        }

        refs.prev.addEventListener("click", function () {
          setActiveItem(state.activeIndex - 1);
        });
        refs.next.addEventListener("click", function () {
          setActiveItem(state.activeIndex + 1);
        });

        for (thumbIndex = 0; thumbIndex < displayItems.length; thumbIndex += 1) {
          refs.thumbButtons.push(
            createThumbButton(displayItems[thumbIndex], thumbIndex, setActiveItem)
          );
          refs.thumbsTrack.appendChild(refs.thumbButtons[thumbIndex]);
        }

        root.innerHTML = "";
        root.appendChild(refs.card);
        initThumbScroller(refs, state);
        if (typeof state.refreshThumbScroller === "function") {
          state.refreshThumbScroller();
        }
        setActiveItem(0);
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
